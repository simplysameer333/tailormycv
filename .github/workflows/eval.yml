name: Eval Harness — Regression Gate

# Runs the CV pipeline against a fixed fixture CV and fails if the generated
# resume scores below the original (regression). Only triggers when pipeline
# logic or evaluator code changes — not on frontend or docs changes.
#
# Cost: ~1 Anthropic Sonnet call × 3 cycles × free tier = ~$0.05–0.10 per run.
# Requires: ANTHROPIC_API_KEY secret set in GitHub repository settings.

on:
  push:
    branches: [main]
    paths:
      - 'backend/services/pipeline/**'
      - 'backend/services/resume_checker_service.py'
      - 'backend/services/user_actions_service.py'
      - 'backend/tests/**'
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run eval harness (free tier — regression gate)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # MongoDB not needed for CI — harness records to memory silently
          MONGODB_URI: mongodb://localhost/ci_harness
        run: |
          python backend/tests/pipeline_harness.py \
            backend/tests/fixtures/sample_cv.txt \
            --tiers free \
            --attempts 1 \
            --output-dir /tmp/harness_results
        # Exit code 1 = generated score < original score (regression) → job fails

      - name: Upload harness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-report-${{ github.sha }}
          path: /tmp/harness_results/*.json
          retention-days: 30
